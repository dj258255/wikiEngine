# 멀티서버 배포 플레이북
# 사용법:
#   전체 배포:       ansible-playbook site.yml
#   앱만 배포:       ansible-playbook site.yml --limit app
#   모니터링만 배포:  ansible-playbook site.yml --limit monitoring
#   Swap 적용:      ansible-playbook site.yml --tags swap

# --- 공통: Docker 설치 + 방화벽 (최초 1회) ---
- name: 공통 설정
  hosts: all
  become: true
  roles:
    - docker
    - firewall

# --- ARM App Server ---
- name: App Server 배포 (ARM)
  hosts: app
  become: true
  gather_facts: false
  vars:
    app_dir: /home/{{ ansible_user }}/wiki-engine/backend
  roles:
    - app

# --- ARM App Server 2 ---
# Phase 11: Docker + 방화벽 기반 준비
# Phase 12: MySQL Replica
# Phase 13: App2 역할 추가 예정
- name: App Server 2 배포 (ARM)
  hosts: app2
  become: true
  gather_facts: false
  vars:
    replica_dir: /home/{{ ansible_user }}/wiki-engine/mysql-replica
  roles:
    - docker
    - firewall
    - mysql-replica

# --- AMD #1: Loki + Grafana ---
- name: Monitoring Loki 배포 (AMD #1)
  hosts: monitoring-loki
  become: true
  gather_facts: false
  vars:
    deploy_dir: /home/{{ ansible_user }}/wiki-engine
  roles:
    - monitoring-loki

# --- AMD #2: Prometheus ---
- name: Monitoring Prometheus 배포 (AMD #2)
  hosts: monitoring-prometheus
  become: true
  gather_facts: false
  vars:
    deploy_dir: /home/{{ ansible_user }}/wiki-engine
  roles:
    - monitoring-prometheus

# --- 전체 Docker 이미지 정리 (배포 후 1회) ---
- name: Docker 이미지 정리
  hosts: all
  become: false
  gather_facts: false
  tasks:
    - name: 미사용 Docker 이미지 정리
      community.docker.docker_prune:
        images: true
        images_filters:
          dangling: true
      tags: [deploy]

# --- Swap (수동 실행, 성능 비교용) ---
# ansible-playbook site.yml --tags swap
- name: Swap 설정 (성능 비교 후 수동 실행)
  hosts: all
  become: true
  roles:
    - swap
