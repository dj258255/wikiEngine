# 서버 2 배포 (Phase 12: MySQL Replica + Phase 13: App 2)
- name: Replica 프로젝트 디렉토리 생성
  file:
    path: "{{ replica_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  tags: [deploy]

- name: Replica docker-compose.yml 배포
  template:
    src: docker-compose.yml.j2
    dest: "{{ replica_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  tags: [deploy]

- name: Replica .env.prod 생성
  template:
    src: env.prod.j2
    dest: "{{ replica_dir }}/.env.prod"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
  tags: [deploy]

# Phase 13: GHCR 로그인 (App 2 이미지 pull용)
- name: GHCR 로그인
  community.docker.docker_login:
    registry_url: ghcr.io
    username: "{{ ghcr_user }}"
    password: "{{ ghcr_token }}"
  become: false
  tags: [deploy]

# Phase 13: Alloy 설정 배포 (App 2 로그 → Loki)
# Docker가 bind mount 경로를 디렉토리로 자동 생성하는 문제 방지
- name: Alloy 설정 경로 정리 (디렉토리가 잘못 생성된 경우)
  file:
    path: "{{ replica_dir }}/alloy-config.alloy"
    state: absent
  tags: [deploy]

- name: Alloy 설정 배포
  template:
    src: alloy-config.alloy.j2
    dest: "{{ replica_dir }}/alloy-config.alloy"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  tags: [deploy]

# Phase 13: Lucene 인덱스 디렉토리 생성 (bind mount 대상)
- name: Lucene 인덱스 디렉토리 생성
  file:
    path: /data/lucene
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  tags: [deploy]

- name: Debezium JMX Exporter 빌드 디렉토리 생성
  file:
    path: "{{ replica_dir }}/debezium/jmx-exporter"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  tags: [deploy]

- name: Debezium Dockerfile + JMX 설정 배포
  copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  loop:
    - { src: "../../kafka-debezium/files/Dockerfile.debezium", dest: "{{ replica_dir }}/debezium/Dockerfile.debezium" }
    - { src: "../../kafka-debezium/files/jmx-exporter/debezium-jmx-config.yml", dest: "{{ replica_dir }}/debezium/jmx-exporter/debezium-jmx-config.yml" }
  tags: [deploy]

- name: Replica + App 2 서비스 시작 (Debezium 이미지 강제 재빌드)
  community.docker.docker_compose_v2:
    project_src: "{{ replica_dir }}"
    env_files: [".env.prod"]
    state: present
    pull: missing
    build: always
    wait: false
    remove_orphans: true
  become: false
  tags: [deploy]

- name: Replica MySQL 헬스체크 대기
  command: docker exec wiki-mysql-replica mysqladmin ping -h localhost
  register: replica_health
  until: replica_health.rc == 0
  retries: 15
  delay: 3
  tags: [deploy]

# Phase 13: App 2 헬스체크 대기 (docker compose --wait 대신 Ansible uri로 직접 확인)
- name: App 2 헬스체크 대기
  uri:
    url: http://localhost:8080/actuator/health
    status_code: 200
    timeout: 5
  register: app2_health
  until: app2_health.status == 200
  retries: 20
  delay: 5
  tags: [deploy]

# Phase 13: Lucene 인덱스 동기화 스크립트 + cron
- name: 스크립트 디렉토리 생성
  file:
    path: /opt/scripts
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  tags: [deploy]

- name: lucene-sync.sh 스크립트 배포
  template:
    src: lucene-sync.sh.j2
    dest: /opt/scripts/lucene-sync.sh
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  tags: [deploy]

- name: lucene-sync cron 등록 (5분 주기)
  cron:
    name: "lucene-sync"
    minute: "*/5"
    job: "/opt/scripts/lucene-sync.sh >> /var/log/lucene-sync.log 2>&1"
    user: "{{ ansible_user }}"
  tags: [deploy]

- name: mysqld_exporter 유저 생성 (Replica — super_read_only 일시 해제)
  command: >
    docker exec wiki-mysql-replica mysql -uroot -p{{ db_root_password }}
    -e "SET GLOBAL super_read_only=OFF; SET GLOBAL read_only=OFF;
    CREATE USER IF NOT EXISTS '{{ mysql_exporter_username }}'@'%'
    IDENTIFIED BY '{{ mysql_exporter_password }}' WITH MAX_USER_CONNECTIONS 3;
    GRANT PROCESS, REPLICATION CLIENT, SELECT ON *.* TO '{{ mysql_exporter_username }}'@'%';
    FLUSH PRIVILEGES;
    SET GLOBAL read_only=ON; SET GLOBAL super_read_only=ON;"
  changed_when: false
  tags: [deploy]
