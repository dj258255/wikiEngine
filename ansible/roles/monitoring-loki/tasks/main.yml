# Monitoring Loki + Grafana 배포 (AMD #1)
- name: 프로젝트 디렉토리 생성
  file:
    path: "{{ deploy_dir }}/{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  loop:
    - ""
    - grafana/provisioning/datasources
    - grafana/provisioning/alerting
    - nginx
    - certbot/www
    - certbot/certs
  tags: [deploy]

- name: Monitoring Loki 파일 동기화
  synchronize:
    src: "{{ role_path }}/files/"
    dest: "{{ deploy_dir }}/"
    delete: true
    rsync_opts:
      - "--exclude=nginx/"
      - "--exclude=certbot/"
      - "--exclude=.env.prod"
  become: false
  register: files_sync
  tags: [deploy]

- name: Monitoring Loki docker-compose.yml 배포
  template:
    src: docker-compose.yml.j2
    dest: "{{ deploy_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  tags: [deploy]

- name: Grafana Prometheus 데이터소스 생성 (템플릿)
  template:
    src: prometheus-datasource.yml.j2
    dest: "{{ deploy_dir }}/grafana/provisioning/datasources/prometheus.yml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  tags: [deploy]

- name: SSL 인증서 존재 확인
  stat:
    path: "{{ deploy_dir }}/certbot/certs/live/{{ grafana_domain }}/fullchain.pem"
  register: ssl_cert
  tags: [deploy]

- name: htpasswd 파일 생성 (Basic Auth)
  shell: >
    echo "{{ monitoring_basic_auth_user }}:$(openssl passwd -apr1
    {{ monitoring_basic_auth_password | quote }})"
    > {{ deploy_dir }}/nginx/htpasswd
  args:
    creates: "{{ deploy_dir }}/nginx/htpasswd"
  tags: [deploy]

- name: htpasswd 권한 설정
  file:
    path: "{{ deploy_dir }}/nginx/htpasswd"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  tags: [deploy]

- name: "Nginx 설정 배포 (HTTP - 인증서 없음)"
  template:
    src: nginx-http.conf.j2
    dest: "{{ deploy_dir }}/nginx/nginx.conf"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  when: not ssl_cert.stat.exists
  tags: [deploy]

- name: "Nginx 설정 배포 (HTTPS - 인증서 있음)"
  template:
    src: nginx-https.conf.j2
    dest: "{{ deploy_dir }}/nginx/nginx.conf"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  when: ssl_cert.stat.exists
  tags: [deploy]

# --- .env.prod 생성 ---
- name: .env.prod 생성
  template:
    src: env.prod.j2
    dest: "{{ deploy_dir }}/.env.prod"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
  tags: [deploy]

# --- 서비스 시작 ---
- name: 전체 서비스 시작
  community.docker.docker_compose_v2:
    project_src: "{{ deploy_dir }}"
    env_files: [".env.prod"]
    state: present
    pull: missing
  become: false
  tags: [deploy]

- name: Grafana 재시작 (프로비저닝 파일 변경 시)
  command: docker restart wiki-grafana-prod
  when: files_sync.changed
  tags: [deploy]

- name: Loki 헬스체크 대기
  uri:
    url: http://localhost:3100/ready
    status_code: 200
    timeout: 5
  register: loki_health
  until: loki_health.status == 200
  retries: 10
  delay: 3
  tags: [deploy]

# --- Certbot 인증서 발급 (최초 1회) ---
- name: "Certbot 인증서 발급 (최초)"
  command: >
    docker run --rm
    -v {{ deploy_dir }}/certbot/www:/var/www/certbot
    -v {{ deploy_dir }}/certbot/certs:/etc/letsencrypt
    certbot/certbot certonly
    --webroot -w /var/www/certbot
    -d {{ grafana_domain }}
    --email {{ certbot_email }}
    --agree-tos --no-eff-email --non-interactive
  when: not ssl_cert.stat.exists
  tags: [deploy]

- name: "HTTPS Nginx 설정으로 전환"
  template:
    src: nginx-https.conf.j2
    dest: "{{ deploy_dir }}/nginx/nginx.conf"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  when: not ssl_cert.stat.exists
  tags: [deploy]

- name: "Nginx 리로드 (HTTPS 적용)"
  command: docker exec monitoring-nginx-prod nginx -s reload
  when: not ssl_cert.stat.exists
  tags: [deploy]

# --- k6 부하 테스트 도구 ---
- name: k6 GPG 키 추가
  rpm_key:
    key: https://dl.k6.io/key.gpg
    state: present
  tags: [setup]

- name: k6 리포지토리 추가
  yum_repository:
    name: k6
    description: k6 load testing tool
    baseurl: https://dl.k6.io/rpm/$basearch/
    gpgcheck: true
    gpgkey: https://dl.k6.io/key.gpg
  tags: [setup]

- name: k6 설치
  dnf:
    name: k6
    state: present
  tags: [setup]

- name: k6 스크립트 배포
  synchronize:
    src: "{{ playbook_dir }}/../backend/k6/"
    dest: /home/{{ ansible_user }}/k6/
    rsync_opts:
      - "--exclude=*.json"
  become: false
  tags: [deploy]

# --- Certbot 자동 갱신 cron ---
- name: Certbot 자동 갱신 cron 등록 (주 1회)
  cron:
    name: "certbot renew - monitoring"
    minute: "0"
    hour: "4"
    weekday: "1"
    job: >
      docker run --rm
      -v {{ deploy_dir }}/certbot/www:/var/www/certbot
      -v {{ deploy_dir }}/certbot/certs:/etc/letsencrypt
      certbot/certbot renew --quiet
      && docker exec monitoring-nginx-prod nginx -s reload
    user: "{{ ansible_user }}"
  tags: [deploy]
