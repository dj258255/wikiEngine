# Phase 14-3: Kafka + Debezium CDC 설정
# Kafka와 Debezium Connect는 서버 2의 docker-compose에 포함됨
# 이 task는 MySQL에 Debezium 사용자를 생성하고 Connector를 등록한다
# tags: deploy를 포함하여 GitHub Actions CI/CD에서 자동 실행

- name: Debezium Connector 등록 스크립트 배포
  copy:
    src: register-connector.sh
    dest: "{{ replica_dir }}/register-connector.sh"
    mode: "0755"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  tags: [deploy, kafka]

- name: MySQL Primary에 Debezium 사용자 생성 (idempotent)
  shell: |
    docker exec wiki-mysql-prod mysql -u root -p"{{ db_root_password }}" -e "
      CREATE USER IF NOT EXISTS 'debezium'@'%' IDENTIFIED BY '{{ debezium_mysql_password }}';
      GRANT SELECT, RELOAD, SHOW DATABASES, REPLICATION SLAVE, REPLICATION CLIENT ON *.* TO 'debezium'@'%';
      FLUSH PRIVILEGES;
    "
  delegate_to: app-arm
  tags: [deploy, kafka]
  changed_when: false

- name: Debezium Connect 시작 대기 (최대 4분)
  uri:
    url: "http://localhost:8083/connectors"
    method: GET
    status_code: 200
  register: connect_ready
  retries: 24
  delay: 10
  until: connect_ready.status == 200
  tags: [deploy, kafka]

- name: Debezium Connector 등록 (idempotent)
  shell: |
    cd {{ replica_dir }} && ./register-connector.sh \
      localhost:8083 \
      {{ hostvars['app-arm'].private_ip }} \
      {{ debezium_mysql_password }}
  tags: [deploy, kafka]
  register: connector_result
  retries: 3
  delay: 10
  until: connector_result.rc == 0
