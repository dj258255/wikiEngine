# 서버별 방화벽 포트 오픈 (최초 1회)
- name: firewalld 설치
  dnf:
    name: firewalld
    state: present
  tags: [setup]

- name: firewalld 서비스 활성화
  systemd:
    name: firewalld
    enabled: true
    state: started
  tags: [setup]

- name: ARM App Server 포트 오픈
  when: server_role == 'app-server'
  command: "firewall-cmd --permanent --add-port={{ item }}/tcp"
  loop:
    - "80"     # Nginx HTTP
    - "443"    # Nginx HTTPS
    - "8080"   # Spring Boot (Prometheus 스크래핑)
    - "9100"   # Node Exporter
    - "9104"   # MySQL Exporter
    - "9121"   # Redis Exporter (Phase 11)
    - "8081"   # cAdvisor
  register: fw_result
  changed_when: "'ALREADY_ENABLED' not in fw_result.stderr"
  tags: [setup]

- name: ARM App Server — Replica → Primary MySQL 접근 허용 (Phase 12)
  when: server_role == 'app-server'
  command: >
    firewall-cmd --permanent --add-rich-rule='rule family="ipv4"
    source address="{{ hostvars['app-arm-2'].private_ip }}"
    port protocol="tcp" port="3306" accept'
  register: fw_rich_result
  changed_when: "'ALREADY_ENABLED' not in fw_rich_result.stderr"
  failed_when: false
  tags: [setup]

- name: ARM App Server 2 포트 오픈
  when: server_role == 'app2'
  command: "firewall-cmd --permanent --add-port={{ item }}/tcp"
  loop:
    - "9100"   # Node Exporter
    - "9104"   # MySQL Exporter (Replica, Phase 12)
  register: fw_result
  changed_when: "'ALREADY_ENABLED' not in fw_result.stderr"
  tags: [setup]

- name: AMD Loki+Grafana 포트 오픈
  when: server_role == 'monitoring-loki'
  command: "firewall-cmd --permanent --add-port={{ item }}/tcp"
  loop:
    - "80"     # Nginx HTTP
    - "443"    # Nginx HTTPS
    - "3100"   # Loki
    - "8086"   # InfluxDB (k6 부하 테스트 결과 수신)
    - "9100"   # Node Exporter
  register: fw_result
  changed_when: "'ALREADY_ENABLED' not in fw_result.stderr"
  tags: [setup]

- name: AMD Loki+Grafana 3001 포트 제거
  when: server_role == 'monitoring-loki'
  command: "firewall-cmd --permanent --remove-port=3001/tcp"
  register: fw_remove_result
  changed_when: "'NOT_ENABLED' not in fw_remove_result.stderr"
  failed_when: false
  tags: [setup]

- name: AMD Prometheus 포트 오픈
  when: server_role == 'monitoring-prometheus'
  command: "firewall-cmd --permanent --add-port={{ item }}/tcp"
  loop:
    - "9090"   # Prometheus
    - "9100"   # Node Exporter
  register: fw_result
  changed_when: "'ALREADY_ENABLED' not in fw_result.stderr"
  tags: [setup]

- name: 방화벽 리로드
  command: firewall-cmd --reload
  tags: [setup]
