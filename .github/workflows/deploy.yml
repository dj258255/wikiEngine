# OCI 멀티서버 배포 워크플로우 (Ansible + Vault)
# main 브랜치 push 시: GHCR 이미지 빌드 → 서버별 독립 배포 (matrix)
#
# 필요한 GitHub Secrets:
#   OCI_SSH_KEY      - SSH 개인키 (PEM, 3대 서버 공통)
#   VAULT_PASSWORD   - ansible-vault 비밀번호

name: Deploy to OCI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'ansible/**'
      - '.github/workflows/deploy.yml'

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 25 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Gradle 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('backend/**/*.gradle*', 'backend/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: 테스트 실행
        working-directory: backend
        run: ./gradlew test

      - name: 레포지토리명 소문자 변환
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker 이미지 빌드 & Push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}:${{ github.sha }}
            ghcr.io/${{ steps.repo.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: read
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - target: app
            name: "App Server (서버 1)"
          - target: app2
            name: "App Server 2 (서버 2)"
          - target: monitoring-loki
            name: "Loki + Grafana (AMD #1)"
          - target: monitoring-prometheus
            name: "Prometheus (AMD #2)"

    name: "Deploy ${{ matrix.name }}"

    steps:
      - name: Checkout (ansible + k6 스크립트)
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            ansible
            backend/k6
          sparse-checkout-cone-mode: true

      - name: 레포지토리명 소문자 변환
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Python 경로 해시 (venv 호환성 키)
        id: python-path
        run: echo "hash=$(python -c 'import sys; print(sys.executable)')" >> "$GITHUB_OUTPUT"

      - name: Ansible venv 캐시 복원
        id: cache-ansible
        uses: actions/cache@v4
        with:
          path: ~/.ansible-venv
          key: ansible-venv-${{ runner.os }}-py${{ steps.python-path.outputs.hash }}-${{ hashFiles('.github/workflows/deploy.yml') }}

      - name: Ansible 설치
        if: steps.cache-ansible.outputs.cache-hit != 'true'
        run: |
          python -m venv ~/.ansible-venv
          source ~/.ansible-venv/bin/activate
          pip install ansible-core

      - name: Ansible 컬렉션 캐시 복원
        id: cache-collections
        uses: actions/cache@v4
        with:
          path: ~/.ansible/collections
          key: ansible-collections-${{ hashFiles('.github/workflows/deploy.yml') }}

      - name: Ansible 컬렉션 설치
        if: steps.cache-collections.outputs.cache-hit != 'true'
        run: |
          source ~/.ansible-venv/bin/activate
          ansible-galaxy collection install community.docker ansible.posix

      - name: Vault 비밀번호 설정
        run: echo "${{ secrets.VAULT_PASSWORD }}" > ansible/.vault_pass

      - name: SSH 키 설정
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OCI_SSH_KEY }}" > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key

      - name: "Ansible 배포: ${{ matrix.name }}"
        env:
          ANSIBLE_HOST_KEY_CHECKING: "false"
          APP_IMAGE: "ghcr.io/${{ steps.repo.outputs.name }}:${{ github.sha }}"
          GHCR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          GHCR_USER: "${{ github.actor }}"
        run: |
          source ~/.ansible-venv/bin/activate
          cd ansible
          ansible-playbook -i inventory.yml site.yml --tags setup,deploy \
            --limit ${{ matrix.target }} \
            -e "app_image=$APP_IMAGE" \
            -e "ghcr_token=$GHCR_TOKEN" \
            -e "ghcr_user=$GHCR_USER"
