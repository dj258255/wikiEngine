# Wiki Engine 애플리케이션 설정
# 모든 환경에서 환경변수로 값을 주입한다.
# 로컬: .env 또는 IDE 환경변수 설정
# 운영: Docker 환경변수
spring:
  application:
    name: wiki-engine

  # MySQL DataSource — Primary/Replica 분리 (Phase 12)
  datasource:
    # Spring Boot 기본 DataSource 설정 (Flyway + DataSourceAutoConfiguration이 참조)
    url: jdbc:mysql://${DB_PRIMARY_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&rewriteBatchedStatements=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    # Primary/Replica HikariCP 풀 (DataSourceConfig에서 사용)
    primary:
      hikari:
        jdbc-url: jdbc:mysql://${DB_PRIMARY_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&rewriteBatchedStatements=true
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
        maximum-pool-size: ${DB_PRIMARY_POOL_SIZE}
        pool-name: primary-pool
        connection-timeout: 5000
        leak-detection-threshold: 10000
    replica:
      hikari:
        jdbc-url: jdbc:mysql://${DB_REPLICA_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&rewriteBatchedStatements=true
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
        maximum-pool-size: ${DB_REPLICA_POOL_SIZE}
        pool-name: replica-pool
        connection-timeout: 5000
        leak-detection-threshold: 10000
        read-only: true

  # Redis (Phase 11: L2 캐시 + 자동완성 flat KV)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        shutdown-timeout: 200ms

  # Kafka (Phase 14-3: CDC Consumer)
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:wiki-cdc-consumer}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: "*"
    listener:
      concurrency: 1  # 단일 파티션이므로 1개 스레드로 충분

  # Flyway: DB 스키마 버전 관리 및 마이그레이션
  # spring.datasource.url (Primary)을 자동으로 사용하므로 별도 URL 불필요
  flyway:
    enabled: ${FLYWAY_ENABLED}
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  # JPA / Hibernate 설정
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO}  # update: 로컬, validate: 운영 (Flyway가 스키마 관리)
    show-sql: ${JPA_SHOW_SQL}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          batch_size: ${HIBERNATE_BATCH_SIZE}  # 배치 INSERT 크기
        order_inserts: true  # INSERT 문 순서 정렬 (배치 최적화)
        generate_statistics: ${HIBERNATE_STATISTICS}  # Hibernate 쿼리 통계 수집 (Actuator 메트릭 노출용)

# Redis 샤딩 (Phase 15: Consistent Hashing)
# redis.sharding.enabled=true면 3개 샤드로 라우팅, 아니면 기존 단일 Redis
redis:
  sharding:
    enabled: ${REDIS_SHARDING_ENABLED:false}
  password: ${REDIS_PASSWORD:}
  shard1:
    host: ${REDIS_SHARD1_HOST:localhost}
    port: ${REDIS_SHARD1_PORT:6379}
  shard2:
    host: ${REDIS_SHARD2_HOST:localhost}
    port: ${REDIS_SHARD2_PORT:6379}
  shard3:
    host: ${REDIS_SHARD3_HOST:localhost}
    port: ${REDIS_SHARD3_PORT:6379}

# 서버 설정
server:
  port: ${SERVER_PORT}
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:200}       # 최대 스레드 수 (기본 200)
      min-spare: ${TOMCAT_MIN_THREADS:10}  # 최소 유휴 스레드
    accept-count: ${TOMCAT_ACCEPT_COUNT:100}  # 큐 대기 최대 수

# JWT 설정
jwt:
  secret: ${JWT_SECRET}  # Base64 인코딩된 비밀키
  expiration: ${JWT_EXPIRATION}  # 토큰 만료 시간 (밀리초, 30분 = 1800000)

# 쿠키 설정
cookie:
  secure: ${COOKIE_SECURE}  # false: 로컬 개발 (HTTP), true: 운영 (HTTPS)

# CORS 설정
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

# Spring Actuator 설정: 애플리케이션 메트릭 모니터링
# /actuator/health, /actuator/metrics, /actuator/prometheus 등 엔드포인트 제공
management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_ENDPOINTS}
  endpoint:
    health:
      show-details: ${HEALTH_SHOW_DETAILS}  # always: 로컬, when-authorized: 운영
  metrics:
    tags:
      application: ${spring.application.name}  # 메트릭에 앱 이름 태그 추가
    distribution:
      percentiles-histogram:
        http.server.requests: true  # P95/P99 계산용 histogram bucket 활성화
        lettuce: true               # Lettuce Redis 커맨드 P95/P99 (Phase 11)

# 데이터 초기화 설정
app:
  init-users: ${INIT_USERS:false}
  wiki-import:
    enabled: ${WIKI_IMPORT_ENABLED:false}
    path: ${WIKI_IMPORT_PATH:}
    news-path: ${NEWS_IMPORT_PATH:}
    web-path: ${WEB_IMPORT_PATH:}

# Lucene 검색엔진 설정
lucene:
  index-path: ${LUCENE_INDEX_PATH}    # 인덱스 파일 저장 경로 (dev: ./data/lucene, prod: /data/lucene)
  batch-size: ${LUCENE_BATCH_SIZE}    # DB에서 한 번에 읽어올 건수 (1만 건씩 → Lucene에 쓰기 → 다음 1만 건)
  mode: ${LUCENE_MODE:primary}        # primary: IndexWriter+NRT, replica: SearcherManager only (Phase 13)

# 로깅 레벨 설정
logging:
  level:
    com.wiki.engine: ${LOG_LEVEL}
    org.hibernate.orm.jdbc.bind: ${HIBERNATE_BIND_LOG_LEVEL:TRACE}  # SQL 파라미터 값 출력 (운영에서는 OFF)
    org.apache.kafka: ${KAFKA_LOG_LEVEL:WARN}
    org.springframework.kafka: ${KAFKA_LOG_LEVEL:WARN}
    io.lettuce.core: ${REDIS_LOG_LEVEL:WARN}
    org.springframework.scheduling.support: ${REDIS_LOG_LEVEL:WARN}
    org.springframework.data.redis: ${REDIS_LOG_LEVEL:WARN}
