plugins {
    id 'java'
    id 'org.springframework.boot' version '4.0.1'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.wiki'
version = '0.0.1-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

repositories {
    mavenCentral()
}

dependencyManagement {
    imports {
        mavenBom 'org.springframework.modulith:spring-modulith-bom:2.0.2'
    }
}

dependencies {
    // Spring Boot 핵심 스타터
    implementation 'org.springframework.boot:spring-boot-starter-web'          // Spring MVC, 내장 Tomcat
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'     // JPA, Hibernate
    implementation 'org.springframework.boot:spring-boot-starter-validation'   // Bean Validation (@NotBlank, @Size 등)
    implementation 'org.springframework.boot:spring-boot-starter-security'     // Spring Security (JWT 인증용)

    // Spring Modulith: 모듈 간 의존성 관리 및 검증
    implementation 'org.springframework.modulith:spring-modulith-starter-core'
    implementation 'org.springframework.modulith:spring-modulith-starter-jpa'

    // JWT (jjwt): 토큰 생성, 파싱, 서명 검증
    implementation 'io.jsonwebtoken:jjwt-api:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.6'

    // Swagger / OpenAPI: REST API 문서 자동 생성, Swagger UI 제공
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:3.0.1'

    // Actuator + Micrometer: 애플리케이션 메트릭 모니터링 (JVM, HTTP, HikariCP, Hibernate 등)
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'io.micrometer:micrometer-registry-prometheus'

    // Lucene: 임베디드 전문 검색엔진 (Nori 한국어 형태소 분석기 포함)
    implementation 'org.apache.lucene:lucene-core:10.3.2'
    implementation 'org.apache.lucene:lucene-analysis-nori:10.3.2'
    implementation 'org.apache.lucene:lucene-queryparser:10.3.2'
    implementation 'org.apache.lucene:lucene-queries:10.3.2'
    implementation 'org.apache.lucene:lucene-highlighter:10.3.2'  // Phase 18: UnifiedHighlighter (검색어 주변 snippet)
    implementation 'org.apache.lucene:lucene-suggest:10.3.2'      // Phase 18: DirectSpellChecker (오타 교정)

    // Spring Cache + Caffeine: @Cacheable/@CacheEvict 추상화 + Caffeine 로컬 캐시
    implementation 'org.springframework.boot:spring-boot-starter-cache'
    implementation 'com.github.ben-manes.caffeine:caffeine:3.2.0'

    // Spring Data Redis: Redis L2 캐시 (Phase 11)
    implementation 'org.springframework.boot:spring-boot-starter-data-redis'

    // Guava: Consistent Hashing에서 MurmurHash3 해시 함수 사용 (Phase 15)
    implementation 'com.google.guava:guava:33.4.0-jre'

    // Spring Kafka: CDC Consumer (Phase 14-3, Debezium → Kafka → Consumer)
    implementation 'org.springframework.boot:spring-boot-starter-kafka'

    // Datafaker: 더미 데이터 생성 (한글/영문 랜덤 이름, 닉네임 등)
    implementation 'net.datafaker:datafaker:2.5.3'

    // Log4j2: Logback 대신 Log4j2 사용 (비동기 로깅, 성능 우수)
    implementation 'org.springframework.boot:spring-boot-starter-log4j2'
    modules {
        module("org.springframework.boot:spring-boot-starter-logging") {
            replacedBy("org.springframework.boot:spring-boot-starter-log4j2", "Use Log4j2 instead of Logback")
        }
    }

    // Flyway: DB 스키마 버전 관리 및 마이그레이션 (Spring Boot 4.0+ 스타터)
    implementation 'org.springframework.boot:spring-boot-starter-flyway'
    implementation 'org.flywaydb:flyway-mysql'

    // MySQL Connector: MySQL 8.0 JDBC 드라이버
    runtimeOnly 'com.mysql:mysql-connector-j'

    // Lombok: 보일러플레이트 코드 자동 생성 (@Getter, @Builder, @RequiredArgsConstructor 등)
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    // 테스트
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'   // @WebMvcTest, MockMvc 등 웹 MVC 테스트 슬라이스
    testImplementation 'org.springframework.modulith:spring-modulith-starter-test'  // Modulith 모듈 의존성 검증 테스트
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.withType(JavaExec).configureEach {
    jvmArgs '--enable-native-access=ALL-UNNAMED'
}

tasks.named('test') {
    useJUnitPlatform()
    jvmArgs '--enable-native-access=ALL-UNNAMED'
}

tasks.named('bootRun') {
    jvmArgs '--enable-native-access=ALL-UNNAMED'
}
